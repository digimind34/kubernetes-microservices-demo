apiVersion: apps/v1
kind: Deployment

metadata:
  name: orders-service
  namespace: microservices-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: orders-service

  template:
    metadata:
      labels:
        app: orders-service

    spec:
      containers:
      - name: orders-service

        image: digi2/orders-service:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 3002

        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 15
          periodSeconds: 20